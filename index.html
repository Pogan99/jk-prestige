<style>
  :root{
    --bg-primary:#30303A;
    --bg-elev:#676061;
    --bg-invert:#526FAE;
    --fg-on-dark:#FFFFFF;
    --fg-muted:#ACB2C3;
    --fg-dim:#8D8B8D;
    --accent:#526FAE;
    --accent-hot:#B10C2A;
    --hairline:#676061;
    --display:'Archivo Black', 'Inter Tight', Inter, system-ui, sans-serif;
    --body:'Inter', system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --density: 1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg-primary);color:var(--fg-on-dark);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  img,svg,video{display:block;max-width:100%}
  /* scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:#20202a}
  ::-webkit-scrollbar-thumb{background:#3d3d48}
  ::-webkit-scrollbar-thumb:hover{background:#4a4a57}

  #root{min-height:100vh}
</style>
